<!DOCTYPE html>
<html lang="en">
<head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>Document</title>
</head>
<body>
     <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
   
    <div class="container">
      <div class="calculator">
        <form name="calc">
          <div class="display">
            <input type="text" name="display" id="display" value="" readonly />
          </div>

          <div>
            <button type="button" class="operator" onclick="display.value = ''">AC</button>
            <button type="button" class="operator" onclick="display.value = display.value.toString().slice(0,-1)">DE</button>
            <button type="button" class="operator" onclick="display.value += '.'">.</button>
            <button type="button" class="operator" onclick="display.value += '/'">/</button>
          </div>

          <div>
            <button type="button" onclick="display.value += '7'">7</button>
            <button type="button" onclick="display.value += '8'">8</button>
            <button type="button" onclick="display.value += '9'">9</button>
            <button type="button" class="operator" onclick="display.value += '*'">*</button>
          </div>

          <div>
            <button type="button" onclick="display.value += '4'">4</button>
            <button type="button" onclick="display.value += '5'">5</button>
            <button type="button" onclick="display.value += '6'">6</button>
            <button type="button" class="operator" onclick="display.value += '-'">-</button>
          </div>

          <div>
            <button type="button" onclick="display.value += '1'">1</button>
            <button type="button" onclick="display.value += '2'">2</button>
            <button type="button" onclick="display.value += '3'">3</button>
            <button type="button" class="operator" onclick="display.value += '+'">+</button>
          </div>

          <div>
            <button type="button" onclick="display.value += '00'">00</button>
            <button type="button" onclick="display.value += '0'">0</button>
            <button type="button" class="equal operator" onclick="display.value = eval(display.value)">=</button>
          </div>
        </form>
      </div>
    </div>
    <script>
      

let display = document.getElementById("display");

document.addEventListener("keydown", function(event){

    let key = event.key;

    // Numbers aur operators
    if(
        (key >= 0 && key <= 9) ||
        key == "+" ||
        key == "-" ||
        key == "*" ||
        key == "/" ||
        key == "."
    ){

        display.value += key;
    }

    // Enter ya = press = answer
    else if(key == "Enter" || key == "="){

        display.value = eval(display.value);
    }

    // Backspace = delete
    else if(key == "Backspace"){

        display.value =
        display.value.toString().slice(0,-1);
    }

    // Escape = clear
    else if(key == "Escape"){

        display.value = "";
    }

});

</script>
    
  </body>
</html>
</body>
</html>
